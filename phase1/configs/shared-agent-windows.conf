<!-- Configuration centralisée — groupe "windows"
     Déployer dans : /var/ossec/etc/shared/windows/agent.conf (sur le serveur) -->
<agent_config>

  <!-- FIM : répertoires sensibles Windows -->
  <syscheck>
    <frequency>300</frequency>
    <directories check_all="yes" realtime="yes">C:\Windows\System32\drivers\etc</directories>
    <directories check_all="yes">C:\Users\Public</directories>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>
  </syscheck>

  <!-- Journaux d'événements Windows -->
  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <localfile>
    <location>Application</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <!-- Sysmon (si installé — recommandé pour la détection de processus suspects) -->
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <!-- PowerShell (détection de commandes suspectes) -->
  <localfile>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

</agent_config>
