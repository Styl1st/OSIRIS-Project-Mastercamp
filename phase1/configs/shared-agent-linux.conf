<!-- Configuration centralisée — groupe "linux"
     Déployer dans : /var/ossec/etc/shared/linux/agent.conf (sur le serveur)
     Poussée automatiquement à tous les agents du groupe. -->
<agent_config>

  <!-- FIM : surveillance d'intégrité des fichiers sensibles -->
  <syscheck>
    <frequency>300</frequency>
    <directories check_all="yes" realtime="yes">/etc</directories>
    <directories check_all="yes" realtime="yes">/usr/bin,/usr/sbin</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/root/.ssh,/home</directories>
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/resolv.conf</ignore>
    <ignore type="sregex">.log$|.tmp$</ignore>
  </syscheck>

  <!-- Collecte de logs locaux -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>
  <!-- Serveur web (srv-web) : décommenter selon le service installé -->
  <!--
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>
  -->

  <!-- Détection des processus en cours (processus suspects) -->
  <localfile>
    <log_format>full_command</log_format>
    <command>ps -eo user,pid,cmd --no-headers</command>
    <alias>process list</alias>
    <frequency>120</frequency>
  </localfile>

</agent_config>
